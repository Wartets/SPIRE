name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust-tests:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check library crates compilation
        run: cargo check -p spire-kernel -p spire-bindings

      - name: Check desktop backend compilation
        if: runner.os != 'Linux'
        run: cargo check -p spire-desktop-backend

      - name: Run kernel test suite
        run: cargo test -p spire-kernel

      - name: Run bindings compilation check
        run: cargo check -p spire-bindings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy lints (library crates)
        run: cargo clippy -p spire-kernel -p spire-bindings -- -D warnings

      - name: Run clippy lints (desktop backend)
        if: runner.os != 'Linux'
        run: cargo clippy -p spire-desktop-backend -- -D warnings

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: apps/spire-desktop
        run: npm install --legacy-peer-deps

      - name: Run svelte-check and TypeScript compiler
        working-directory: apps/spire-desktop
        run: npm run check

      - name: Strict TypeScript type check
        working-directory: apps/spire-desktop
        run: npx tsc --noEmit

  documentation:
    name: Documentation Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust documentation
        run: cargo doc -p spire-kernel -p spire-bindings --no-deps

  python-bindings:
    name: Python Bindings Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check Python bindings compilation
        run: cargo check -p spire-bindings --features python
