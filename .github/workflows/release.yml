name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------
  # 1. Run the full test suite before releasing
  # -------------------------------------------------------------------
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_PKG=libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev

      - name: Run test suite
        run: cargo test -p spire-kernel

  # -------------------------------------------------------------------
  # 2. Build Python wheels with Maturin
  # -------------------------------------------------------------------
  python-wheels:
    name: Python Wheel (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_PKG=libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev

      - name: Install Maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --features python,extension-module --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7

  # -------------------------------------------------------------------
  # 3. Build Tauri desktop application
  # -------------------------------------------------------------------
  tauri-build:
    name: Desktop App (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux-specific system dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            WEBKIT_PKG=libwebkit2gtk-4.1-dev
          else
            WEBKIT_PKG=libwebkit2gtk-4.0-dev
          fi
          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup2.4-dev

      - name: Install frontend dependencies
        working-directory: apps/spire-desktop
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: apps/spire-desktop
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/spire-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "SPIRE ${{ github.ref_name }}"
          releaseBody: |
            ## SPIRE ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` disk image
            - **Linux**: `.deb` package and `.AppImage`

            ### Python Library
            Download the `spire_hep` wheel for your platform from the assets below.

            ```bash
            pip install spire_hep-*.whl
            ```

            ### Changes
            See [CHANGELOG](https://github.com/Wartets/SPIRE/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false

  # -------------------------------------------------------------------
  # 4. Attach Python wheels to the GitHub Release
  # -------------------------------------------------------------------
  publish-wheels:
    name: Attach Python Wheels
    needs: [python-wheels, tauri-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          merge-multiple: true
          path: wheels

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: wheels/*.whl
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
