term_kind         = "Interaction"
expression        = "-i (g_z) \\gamma^{\\mu} (g_V^\\tau - g_A^\\tau \\gamma^5)"
n_legs            = 3

[[vertex]]
id                = "nc_nnz"
description       = "Weak NC vertex: electron neutrino-Z coupling"
field_ids         = ["nu_e", "nu_e", "Z0"]
coupling_symbol   = "g_z_nue"
coupling_value    = 0.7397
lorentz_structure = "gamma_mu"
interaction_type  = "WeakNC"
term_kind         = "Interaction"
expression        = "-i (g_z / 2) \\gamma^{\\mu} P_L"
n_legs            = 3

[[vertex]]
id                = "nc_nmnmz"
description       = "Weak NC vertex: muon neutrino-Z coupling"
field_ids         = ["nu_mu", "nu_mu", "Z0"]
coupling_symbol   = "g_z_numu"
coupling_value    = 0.7397
lorentz_structure = "gamma_mu"
interaction_type  = "WeakNC"
term_kind         = "Interaction"
expression        = "-i (g_z / 2) \\gamma^{\\mu} P_L"
n_legs            = 3

[[vertex]]
id                = "nc_uuz"
description       = "Weak NC vertex: up quark-Z coupling"
field_ids         = ["u", "u", "Z0"]
coupling_symbol   = "g_z_u"
coupling_value    = 0.7397
lorentz_structure = "gamma_mu"
interaction_type  = "WeakNC"
term_kind         = "Interaction"
expression        = "-i (g_z) \\gamma^{\\mu} (g_V^u - g_A^u \\gamma^5)"
n_legs            = 3

[[vertex]]
id                = "nc_ddz"
description       = "Weak NC vertex: down quark-Z coupling"
field_ids         = ["d", "d", "Z0"]
coupling_symbol   = "g_z_d"
coupling_value    = 0.7397
lorentz_structure = "gamma_mu"
interaction_type  = "WeakNC"
term_kind         = "Interaction"
expression        = "-i (g_z) \\gamma^{\\mu} (g_V^d - g_A^d \\gamma^5)"
n_legs            = 3

# ============================================================================
# QCD VERTICES — Strong coupling (SU(3)_C)
# ============================================================================

[[vertex]]
id                = "qcd_uug"
description       = "QCD vertex: up quark-gluon coupling"
field_ids         = ["u", "u", "g"]
coupling_symbol   = "g_s"
coupling_value    = 1.218
lorentz_structure = "gamma_mu"
interaction_type  = "Strong"
term_kind         = "Interaction"
expression        = "-i g_s T^a \\gamma^{\\mu}"
n_legs            = 3

[[vertex]]
id                = "qcd_ddg"
description       = "QCD vertex: down quark-gluon coupling"
field_ids         = ["d", "d", "g"]
coupling_symbol   = "g_s"
coupling_value    = 1.218
lorentz_structure = "gamma_mu"
interaction_type  = "Strong"
term_kind         = "Interaction"
expression        = "-i g_s T^a \\gamma^{\\mu}"
n_legs            = 3

# ============================================================================
# YUKAWA VERTICES — Higgs-fermion coupling
# ============================================================================

[[vertex]]
id                = "yuk_eeh"
description       = "Yukawa vertex: electron-Higgs coupling"
field_ids         = ["e-", "e-", "H"]
coupling_symbol   = "y_e"
coupling_value    = 0.00000294
lorentz_structure = "scalar"
interaction_type  = "Yukawa"
term_kind         = "Interaction"
expression        = "-i y_e / \\sqrt{2}"
n_legs            = 3
